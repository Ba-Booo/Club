<!DOCTYPE html>
<html lang="en">
<head>
    <title>꽃 한송이</title>
</head>
<bod>
    <p id="text" style="font-size: 42px;">당신은 이 꽃 한송이를 위해 무엇을 할 수 있습니까?<br>꽃을 쓰다듬어 마음을 전하세요!<br></p>
    <img id="flower" src="https://cdn.crowdpic.net/list-thumb/thumb_l_AF14A6656BCB05C65F54CBB072987524.png?"> <br>

<script>

        setInterval( function() { window.close(); }, 1000 );
    }
</script>
